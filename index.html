<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South-View Cemetery — Digital Tour</title>

    <!-- Pannellum -->
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css">
    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/tour.css">
</head>
<body>

    <!-- ==================== LOADING SCREEN ==================== -->
    <div id="loading-screen">
        <div class="loader-content">
            <div class="loader-icon">
                <svg viewBox="0 0 100 100" width="80" height="80">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
                    <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="0.5"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#d4af37" stroke-width="1.5"
                        stroke-dasharray="283" stroke-dashoffset="283" class="spinner"/>
                    <text x="50" y="48" text-anchor="middle" fill="#d4af37"
                        font-family="Cinzel" font-size="8" letter-spacing="3">SOUTH-VIEW</text>
                    <text x="50" y="60" text-anchor="middle" fill="rgba(212,175,55,0.6)"
                        font-family="Cormorant Garamond" font-size="6" letter-spacing="1.5">CEMETERY</text>
                </svg>
            </div>
            <h1 class="loader-title">South-View Cemetery</h1>
            <p class="loader-subtitle">Digital Heritage Tour</p>
            <div class="loader-bar">
                <div class="loader-bar-fill"></div>
            </div>
            <p class="loader-hint">Est. 1886 · Atlanta, Georgia</p>
        </div>
    </div>

    <!-- ==================== MAIN TOUR ==================== -->
    <div id="tour-wrapper" class="hidden">

        <!-- Header -->
        <header id="tour-header">
            <div class="header-inner">
                <div class="header-brand">
                    <span class="brand-mark">SV</span>
                    <div>
                        <h1>South-View Cemetery</h1>
                        <p class="header-tagline">Digital Heritage Tour</p>
                    </div>
                </div>
                <div class="header-scene-name" id="current-scene-label">Cemetery Entrance</div>
            </div>
        </header>

        <!-- Panorama Viewer -->
        <div id="panorama"></div>

        <!-- Mini-map -->
        <div id="minimap">
            <div class="minimap-inner">
                <svg viewBox="0 0 200 140" width="200" height="140">
                    <!-- Cemetery outline -->
                    <rect x="10" y="10" width="180" height="120" rx="8"
                        fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
                    <!-- Paths -->
                    <line x1="55" y1="30" x2="100" y2="70" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4"/>
                    <line x1="100" y1="70" x2="150" y2="105" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4"/>
                    <!-- Location dots -->
                    <circle cx="55" cy="30" r="6" class="map-dot" data-scene="entrance"/>
                    <circle cx="100" cy="70" r="6" class="map-dot" data-scene="historic_section"/>
                    <circle cx="150" cy="105" r="6" class="map-dot" data-scene="memorial_garden"/>
                    <!-- Labels -->
                    <text x="55" y="48" text-anchor="middle" fill="rgba(255,255,255,0.5)"
                        font-family="Cormorant Garamond" font-size="8">Entrance</text>
                    <text x="100" y="88" text-anchor="middle" fill="rgba(255,255,255,0.5)"
                        font-family="Cormorant Garamond" font-size="8">Historic</text>
                    <text x="150" y="123" text-anchor="middle" fill="rgba(255,255,255,0.5)"
                        font-family="Cormorant Garamond" font-size="8">Memorial</text>
                </svg>
            </div>
            <div class="minimap-label">MAP</div>
        </div>

        <!-- Timeline -->
        <div id="timeline">
            <div class="timeline-track">
                <div class="timeline-marker" data-year="1886" style="left: 0%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1886</span>
                    <span class="timeline-event">Cemetery Founded</span>
                </div>
                <div class="timeline-marker" data-year="1899" style="left: 13%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1899</span>
                    <span class="timeline-event">MLK Sr. Born</span>
                </div>
                <div class="timeline-marker" data-year="1905" style="left: 19%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1905</span>
                    <span class="timeline-event">Herndon Founds Atlanta Life</span>
                </div>
                <div class="timeline-marker" data-year="1927" style="left: 42%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1927</span>
                    <span class="timeline-event">Herndon Passes</span>
                </div>
                <div class="timeline-marker" data-year="1961" style="left: 76%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1961</span>
                    <span class="timeline-event">Dobbs Passes</span>
                </div>
                <div class="timeline-marker" data-year="1984" style="left: 100%">
                    <span class="timeline-dot"></span>
                    <span class="timeline-year">1984</span>
                    <span class="timeline-event">MLK Sr. Passes</span>
                </div>
            </div>
        </div>

        <!-- Person Overlay -->
        <div id="person-overlay" class="overlay hidden">
            <div class="glass-card">
                <button class="close-btn" aria-label="Close">&times;</button>
                <div class="card-portrait">
                    <img id="person-photo" src="" alt="">
                </div>
                <div class="card-info">
                    <h2 id="person-name"></h2>
                    <p class="dates" id="person-dates"></p>
                    <div class="facts" id="person-facts"></div>
                </div>
                <button class="narration-btn" id="narration-btn" aria-label="Play narration">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <span>Listen</span>
                </button>
            </div>
        </div>

    </div>

    <script src="js/tour.js"></script>
</body>
</html>
